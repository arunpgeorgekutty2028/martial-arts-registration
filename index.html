<!DOCTYPE html>
<html>
<head>
    <title>Martial Arts Tournament 2026</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #111;
            color: white;
            text-align: center;
        }

        header {
            background: url('https://images.unsplash.com/photo-1599058917212-d750089bc07e') no-repeat center/cover;
            padding: 80px 20px;
        }

        header h1 {
            font-size: 40px;
            margin: 0;
        }

        header p {
            font-size: 18px;
        }

        .container {
            margin: 40px auto;
            width: 90%;
            max-width: 500px;
            background: #1c1c1c;
            padding: 20px;
            border-radius: 10px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px 20px;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ff4d5a;
        }

        #message {
            margin-top: 15px;
            color: #00ffcc;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            font-size: 14px;
            background: #000;
        }
    </style>
</head>

<body>

<header>
    <h1> Martial Arts Tournament 2026</h1>
    <h2>Register now and showcase your skills!</h2>
</header>

<div class="container">
    <h2>Registration Form</h2>

    <form onsubmit="return submitForm()">
        <input type="text" id="name" placeholder="Full Name" required><br>
        <input type="email" id="email" placeholder="Email Address" required><br>
        
        <select id="category" required>
            <option value="">Select Category</option>
            <option>Karate</option>
            <option>Taekwondo</option>
            <option>Judo</option>
            <option>Kung Fu</option>
        </select><br>

        <input type="number" id="age" placeholder="Age" required><br>

        <button type="submit">Register Now</button>
    </form>

    <p id="message"></p>
</div>

<footer>
     2026 Martial Arts Championship 
</footer>

<script>
function submitForm() {
    document.getElementById("message").innerHTML =
        " Registration Successful! See you at the tournament.";
    return false;
}
</script>

</body>
</html>
